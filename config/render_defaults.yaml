# Defaults para todos os renders. Override por mensagem em
# memory/messages/<slug>/overrides.yaml se quiser.

output:
  width: 1080
  height: 1920
  fps: 30

video:
  encoder: libx264
  preset: slow
  crf: 18
  pix_fmt: yuv420p

audio:
  codec: aac
  bitrate: 128k
  target_lufs: -14.0   # padrão Insta/TikTok/Reels

tracking:
  sample_fps: 2.0       # detecções por segundo
  smooth_window_s: 2.5  # janela de média móvel
  detector: mediapipe   # mediapipe | haar
  min_face_size: 80

subtitle:
  min_words: 3
  max_words: 4
  max_chars: 20
  # Which font preset to burn in. See config/style_presets/README.md for the
  # full list. The default `arial-black` ships on macOS, Windows, and most
  # Linux distros — no extra install needed.
  #   arial-black     → Arial Black (universal default)
  #   helvetica-bold  → Helvetica Bold (macOS-native, slightly lighter)
  #   outfit-black    → Outfit Black (requires manual font install)
  preset: arial-black
  # Optional: force a specific .ttf path if libass can't find the font by name.
  # Leave null to let libass resolve via fontconfig.
  font_path: null

cut_validation:
  min_pause_after_last_token_s: 0.5
  forbid_endings:                      # se cut termina nessas palavras, INVALID
    - porque
    - mas
    - e
    - que
    - para
    - de
    - com
    - em
  required_terminal_punct: ".!?"       # cue final ideal termina em uma dessas

# Caminho do binário ffmpeg. null = usar o `ffmpeg` do PATH.
# Override pra um build com libass habilitada (ex: /opt/homebrew/opt/ffmpeg-full/bin/ffmpeg)
# se o ffmpeg padrão do sistema não suportar burned subtitles.
ffmpeg_bin: null
