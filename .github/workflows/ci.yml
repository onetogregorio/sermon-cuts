name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile-check all Python scripts
        run: python -m compileall -q scripts/

      - name: Install lint tools
        run: pip install yamllint ruff pytest pyyaml

      - name: ruff check
        run: ruff check scripts/

      - name: ruff format --check
        run: ruff format --check scripts/

      - name: Validate YAML configs
        run: yamllint -d relaxed config/ .github/

      - name: Validate render_defaults.yaml schema
        run: |
          python - <<'PY'
          import yaml, sys
          cfg = yaml.safe_load(open("config/render_defaults.yaml"))
          required_top = {"output", "video", "audio", "tracking", "subtitle", "cut_validation"}
          missing = required_top - set(cfg)
          if missing:
              sys.exit(f"render_defaults.yaml missing top-level keys: {missing}")
          for k in ("width", "height", "fps"):
              assert k in cfg["output"], f"output.{k} missing"
          print("render_defaults.yaml schema OK")
          PY

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Validate every style preset parses
        run: |
          python - <<'PY'
          # Every config/style_presets/*.txt is a libass force_style string.
          # Confirm each one has the keys downstream scripts depend on.
          from pathlib import Path
          required = {"FontName", "FontSize", "PrimaryColour", "OutlineColour",
                      "Alignment", "MarginV"}
          presets = sorted(Path("config/style_presets").glob("*.txt"))
          if not presets:
              raise SystemExit("no presets found in config/style_presets/")
          for preset_path in presets:
              txt = preset_path.read_text().strip()
              pairs = [p.strip() for p in txt.split(",") if p.strip()]
              keys = {p.split("=")[0] for p in pairs}
              missing = required - keys
              if missing:
                  raise SystemExit(f"{preset_path.name} missing keys: {missing}")
              print(f"  ✓ {preset_path.name}")
          print(f"all {len(presets)} preset(s) OK")
          PY
